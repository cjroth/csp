name: Release Obsidian Plugin

# Builds the Obsidian plugin (wasm + esbuild) and publishes main.js +
# manifest.json as a GitHub Release. BRAT reads release assets, so this is
# what makes `cjroth/csp` installable on mobile.
#
# Trigger: push a tag of the form `obsidian-v<semver>` matching the version
# in plugins/obsidian/manifest.json, e.g.
#   git tag obsidian-v0.1.0 && git push origin obsidian-v0.1.0
# Or run manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - 'obsidian-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. obsidian-v0.1.0). Must already exist or will be created.'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify manifest version matches tag
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          EXPECTED="${TAG#obsidian-v}"
          ACTUAL="$(jq -r .version plugins/obsidian/manifest.json)"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Tag $TAG implies manifest version $EXPECTED, but plugins/obsidian/manifest.json has $ACTUAL. Bump the manifest and re-tag."
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/csp-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install plugin dependencies
        run: bun install --frozen-lockfile
        working-directory: plugins/obsidian

      - name: Build plugin (wasm + esbuild)
        run: bun run build
        working-directory: plugins/obsidian

      - name: Sanity-check artifacts
        run: |
          test -f plugins/obsidian/main.js
          test -f plugins/obsidian/manifest.json
          # BRAT refuses installs if these don't match; we already verified
          # above, but re-check the file that will actually ship.
          ACTUAL="$(jq -r .version plugins/obsidian/manifest.json)"
          EXPECTED="${{ steps.tag.outputs.name }}"
          EXPECTED="${EXPECTED#obsidian-v}"
          [ "$EXPECTED" = "$ACTUAL" ] || { echo "manifest drift"; exit 1; }

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Obsidian plugin ${{ steps.tag.outputs.name }}
          files: |
            plugins/obsidian/main.js
            plugins/obsidian/manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
