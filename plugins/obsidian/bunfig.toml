# Bun test configuration for the Obsidian plugin.
# `bun test --coverage` produces line + function coverage; we use it as a
# guardrail rather than a hard CI failure (assertions live in the test
# bodies).

[install]
# Don't install npm package versions newer than 7 days, to blunt
# supply-chain attacks via freshly-published malicious releases.
minimumReleaseAge = 604800

[test]
coverageReporter = ["text"]
coverageSkipTestFiles = true
preload = ["./test/setup.ts"]
